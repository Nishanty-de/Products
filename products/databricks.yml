# This is a Databricks asset bundle definition for products.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: products
  uuid: b01bb137-cc48-4804-a3e1-f7df046c351c

include:
  - resources/*.yml

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://dbc-eb91d474-214a.cloud.databricks.com
    variables:
      catalog: main
      schema: ${workspace.current_user.short_name}
  prod:
    mode: production
    workspace:
      host: https://dbc-eb91d474-214a.cloud.databricks.com
      # We explicitly deploy to /Workspace/Users/nishanty@gmail.com to make sure we only have a single copy.
      root_path: /Workspace/Users/nishanty@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: main
      schema: prod
    permissions:
      - user_name: nishanty@gmail.com
        level: CAN_MANAGE
