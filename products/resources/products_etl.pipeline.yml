# The main pipeline for products

resources:
  pipelines:
    products_etl:
      name: products_etl
      catalog: ${var.catalog}
      schema: ${var.schema}
      serverless: true
      root_path: "../src/products_etl"

      libraries:
        - glob:
            include: ../src/products_etl/transformations/**

      environment:
        dependencies:
          # We include every dependency defined by pyproject.toml by defining an editable environment
          # that points to the folder where pyproject.toml is deployed.
          - --editable ${workspace.file_path}
